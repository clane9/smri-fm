# Name of the run. Used for output directory suffix and wandb.
name: patch8_pretrain_smri_mae

# Description of the run. Goes in wandb notes.
notes: null

# Root output directory.
# The run writes to checkpoints/<name> when name is set.
output_dir: checkpoints

# Standard 3D structural MRI volume size.
img_size: [208, 240, 208]
patch_size: 8

# Masking.
mask_ratio: 0.80
pred_mask_ratio: null
masking: random
masking_kwargs: {}

# Train-time MRI augmentation. Applied once per loaded train volume before
# masking. Evaluation stays unaugmented.
augmentation:
  enabled: false
  pad_range: [4, 8]
  scale: [0.9, 1.1]
  shift: [-0.1, 0.1]
  noise_std: [0.0, 0.03]
  blur:
    p: 0.0
    sigma: [0.3, 0.6]

# Hybrid 3D masking example.
# masking: hybrid
# masking_kwargs:
#   block_size: [2, 2, 2]
#   random_fraction: 0.5
#   block_fraction: 0.5

# Model.
model: mae_vit_base
model_kwargs:
  # decoding mode: attn, cross, or crossreg.
  decoding: attn

  # target normalization: null/none, global, slice, or patch.
  target_norm: none

  no_decode_pos: false
  mask_drop_scale: false

  class_token: true
  reg_tokens: 0
  no_embed_class: false

  decoder_depth: 4
  drop_path_rate: 0.0

# Datasets.
datasets:
  aabc_train:
    local: datasets/aabc/mds
    split: train
    batch_size: 64
    shuffle: true
    shuffle_seed: 7338
    epoch_size: 10000
    shuffle_block_size: 1000
    drop_last: true

  aabc_val:
    local: datasets/aabc/mds
    split: val
    batch_size: 64
    shuffle: false
    shuffle_seed: 7338
    drop_last: false

train_dataset: aabc_train
eval_datasets:
  - aabc_val

# Data loader.
num_workers: 16
prefetch_factor: 8
presend_cuda: false

# Synchronizing step profiler. Set to a small value, e.g. 10, for bottleneck checks.
profile_steps: 0

# Optimization.
epochs: 400
batch_size: 32
accum_iter: 1

base_lr: 0.001
min_lr: 1e-6
warmup_epochs: 40
weight_decay: 0.05
betas: [0.9, 0.95]
clip_grad: 1.0

amp: true
amp_dtype: bfloat16

compile: false

# Checkpointing.
ckpt: null
resume: false
auto_resume: true
start_epoch: 0
checkpoint_period: 1
max_checkpoints: 5

# Sync checkpoints to an R2 bucket using the AWS CLI. Set to a URL to enable.
r2_sync: null

device: cuda:0
distributed: false
seed: 7338
eval_seed: 7338
debug: false

wandb: false
wandb_entity: null
wandb_project: smri-fm
